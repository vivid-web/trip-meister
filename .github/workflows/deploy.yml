name: 🚀 Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, closed]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_REGION: ams
  FLY_ORG: vivid-web

jobs:
  review_app:
    name: 🚀 Deploy review app
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: pr-${{ github.event.number }}
    environment:
      name: Review app
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: 🗄 Create database
        id: create_database
        uses: vivid-web/turso-pr-review-apps@v0.0.5
        with:
          organization: ${{ secrets.TURSO_ORGANIZATION_NAME }}
          api_token: ${{ secrets.TURSO_API_TOKEN }}
          db_name: trip-meister-pr-${{ github.event.number }}

      # Use the output from the `create_database` step
      - name: Get the output hostname
        run: echo "URL ${{ env.TURSO_DATABASE_URL }}"
      - name: Get the output token
        run: echo "URL ${{ env.TURSO_AUTH_TOKEN }}"

      - name: 🚀 Deploy PR app to Fly
        id: deploy
        uses: superfly/fly-pr-review-apps@1.3.0
        with:
          secrets: >-
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
            FLY_API_TOKEN=${{ secrets.FLY_API_TOKEN }}
            FLY_ORG=${{ secrets.FLY_ORG }}
            FLY_REGION=${{ secrets.FLY_REGION }}
            GITHUB_CLIENT_ID=${{ secrets._GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets._GITHUB_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            TURSO_DATABASE_URL=libsql://${{ env.TURSO_DATABASE_URL }}
            TURSO_AUTH_TOKEN=${{ env.TURSO_AUTH_TOKEN }}

  production:
    name: 🚀 Deploy production
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'push' }}
    environment:
      name: Production
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: 🎈 Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: 🚀 Deploy Production
        run: flyctl deploy --remote-only
